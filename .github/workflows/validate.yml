name: Validation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f accessguard_backend/requirements.txt ]; then pip install -r accessguard_backend/requirements.txt; fi
    - name: Run basic health checks
      run: |
        # Since this is a validation workflow, we just check if it can be imported without syntax errors
        cd accessguard_backend
        python -m py_compile app/main.py
